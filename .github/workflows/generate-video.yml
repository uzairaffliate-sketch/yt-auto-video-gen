name: Generate Video

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Full video script (text)'
        required: true
        type: string
      aspect_ratio:
        description: 'Aspect Ratio'
        required: true
        type: choice
        options:
          - '16:9'
          - '9:16'
          - '1:1'
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        options:
          - '1080p'
          - '720p'
      voiceover_type:
        description: 'Voiceover Type'
        required: true
        type: choice
        options:
          - 'tts'
          - 'custom_audio'
          - 'no_audio'
      audio_url:
        description: 'Custom audio URL (if voiceover_type=custom_audio)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Debug environment
        run: |
          which python
          python --version
          which pip
          pip --version

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Force clean install of all Python packages
        run: |
          python -m pip uninstall -y moviepy imageio imageio-ffmpeg decorator numpy pillow aiohttp requests beautifulsoup4 gTTS spacy sentence-transformers pydub tqdm || true
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install --no-cache-dir --verbose -r requirements.txt

      - name: Verify moviepy import
        run: |
          python -m pip show moviepy
          python -c "import sys; print('sys.path:', sys.path)"
          python -c "from moviepy.editor import VideoFileClip; print('moviepy import successful')"

      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: ~/spacy_data
          key: spacy-en-core-web-sm-3.7.1

      - name: Download spaCy model (with retry)
        run: |
          MODEL="en_core_web_sm-3.7.1"
          for i in 1 2 3; do
            echo "Attempt $i: Downloading $MODEL..."
            python -m spacy download en_core_web_sm --direct && break
            pip install https://github.com/explosion/spacy-models/releases/download/${MODEL}/${MODEL}-py3-none-any.whl && break
            echo "Attempt $i failed, waiting 10 seconds..."
            sleep 10
          done
          python -c "import spacy; spacy.load('en_core_web_sm'); print('spaCy model loaded')"

      - name: Run video generator
        env:
          SCRIPT: ${{ github.event.inputs.script }}
          ASPECT: ${{ github.event.inputs.aspect_ratio }}
          QUALITY: ${{ github.event.inputs.quality }}
          VOICEOVER_TYPE: ${{ github.event.inputs.voiceover_type }}
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
        run: python src/main.py

      - name: Upload output video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/output.mp4
          retention-days: 7
