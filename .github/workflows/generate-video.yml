name: Generate Video

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Full video script (text)'
        required: true
        type: string
      aspect_ratio:
        description: 'Aspect Ratio'
        required: true
        type: choice
        options:
          - '16:9'
          - '9:16'
          - '1:1'
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        options:
          - '1080p'
          - '720p'
      voiceover_type:
        description: 'Voiceover Type'
        required: true
        type: choice
        options:
          - 'tts'
          - 'custom_audio'
          - 'no_audio'
      audio_url:
        description: 'Custom audio URL (if voiceover_type=custom_audio)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('requirements.txt') }}

      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: ~/spacy_data
          key: spacy-en-core-web-sm-3.7

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: st-all-MiniLM-L6-v2

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify critical packages
        run: |
          python -c "import moviepy; print('moviepy version:', moviepy.__version__)"
          python -c "import PIL; print('Pillow version:', PIL.__version__)"
          python -c "import aiohttp; print('aiohttp version:', aiohttp.__version__)"

      - name: Download spaCy model
        run: |
          python -m spacy download en_core_web_sm

      - name: Run video generator
        env:
          SCRIPT: ${{ github.event.inputs.script }}
          ASPECT: ${{ github.event.inputs.aspect_ratio }}
          QUALITY: ${{ github.event.inputs.quality }}
          VOICEOVER_TYPE: ${{ github.event.inputs.voiceover_type }}
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
        run: python src/main.py

      - name: Upload output video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/output.mp4
          retention-days: 7
